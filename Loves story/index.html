<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary! ❤️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            width: 320px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .gif-container {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h2 {
            color: #d63384;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .desc {
            color: #6c757d;
            font-size: 14px;
            line-height: 1.6;
            padding: 0 10px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            position: relative;
            width: 100%;
            justify-content: center;
            height: 50px;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
        }

        #yesBtn:hover {
            background-color: #ff2a65;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: absolute;
            margin-left: 200px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="gif-container">
            <img id="statusImg" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWNldTZqczh5bHo5dTdkY25kNGh0cjY2NnQ5YWZ5YnNhdWttb3dhYiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/1JmGiBtqTuehfYxuy9/giphy.gif" alt="Cute Cat">
        </div>
        
        <h2 id="questionText">ညီမလေး ကိုကိုချစ်လား?</h2>
        <p id="subText" class="desc"></p>

        <div class="btn-group" id="btnGroup">
            <button id="yesBtn" onclick="selectYes()">Yes</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const card = document.querySelector('.card');
        const statusImg = document.getElementById('statusImg');
        const questionText = document.getElementById('questionText');
        const subText = document.getElementById('subText');
        const btnGroup = document.getElementById('btnGroup');

        
        function moveNoButton() {
            // Card ရဲ့ အကျယ်နဲ့ အမြင့်အတွင်းမှာပဲ ပြေးအောင် လုပ်ထားပါတယ်
            const cardWidth = card.clientWidth;
            const cardHeight = card.clientHeight;

            const maxX = cardWidth - noBtn.clientWidth - 40;
            const maxY = cardHeight - noBtn.clientHeight - 100;

            // Random နေရာအသစ် ရှာဖွေခြင်း
            const randomX = Math.floor(Math.random() * maxX) - (cardWidth/2 - noBtn.clientWidth);
            const randomY = Math.floor(Math.random() * maxY) - (cardHeight/2 - noBtn.clientHeight);
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        
        function selectYes() {
            
            statusImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWNldTZqczh5bHo5dTdkY25kNGh0cjY2NnQ5YWZ5YnNhdWttb3dhYiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/IzXiddo2twMmdmU8Lv/giphy.gif";
            
        
            questionText.innerHTML = "သိသားဘဲ! ❤️";
            subText.innerHTML = "ပြန်ချစ်တာမဆန်းပါဘူး စောက်ချောကြီးကို စတာ... အများကြီးချစ်တယ်နော်။ <br> <b>၂ နှစ်ပြည့်အထိန်းအမှတ်အဖြစ် အာဘွား😘😘အရမ်းချစ်တယ်နော်  တီလူကြီးက မင်းလေးအပိုင်ပါဗျာ ဘာပြောရမန်းမသိတော့ဘူး  ရှက်လို့ Hee..😁ချစ်တယ်နော် သက်ဆုံးတိုင်အတူတူရှင်ကျမယ်  သတိ🚨🚨တိလူကြီးကိုအရမ်းပစ်မထားပါနဲ့နော် အသဲနုလို့ပါ😁😁.</b>";
            
    
            btnGroup.style.display = 'none';
        }
    </script>
</body>
</html>
